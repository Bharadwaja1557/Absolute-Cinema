<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Cinema — A personal moviegoing archive</title>
  <meta name="description" content="A personal archive of every film watched in a theater. Every ticket, every screening, every memory." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body id="top">

  <!-- ===================== STICKY TOPBAR ===================== -->
  <header class="topbar">
    <div class="topbar__brandrow">
      <a class="brand" href="#top" aria-label="Absolute Cinema — home">
        <span class="brand__mark" aria-hidden="true"></span>
        <span class="brand__name">Absolute Cinema</span>
      </a>
    </div>

    <div class="topbar__controls">
      <label class="search" for="search-input">
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" />
        </svg>
        <input id="search-input" class="search__input" type="search"
          placeholder="Search films…" autocomplete="off" spellcheck="false"
          aria-label="Search films by title" />
      </label>

      <div class="filters">
        <div class="select">
          <select id="filter-year" aria-label="Filter by year">
            <option value="all">All years</option>
          </select>
        </div>
        <div class="select">
          <select id="filter-lang" aria-label="Filter by language">
            <option value="all">All languages</option>
          </select>
        </div>
        <button id="sort-toggle" class="sortbtn" type="button"
          aria-label="Toggle sort order">
          <span class="sortbtn__icon" aria-hidden="true">↓</span>
          <span id="sort-label">Newest</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- meta line: count + clear -->
    <div class="gallery-meta">
      <p class="gallery-meta__count" id="result-count" aria-live="polite">—</p>
      <button class="gallery-meta__clear" id="clear-filters" type="button" hidden>
        Clear filters
      </button>
    </div>

    <!-- ===================== GALLERY ===================== -->
    <section class="gallery" id="gallery" aria-label="Films by year">
      <div class="loading" id="loading">
        <span class="loading__reel" aria-hidden="true"></span> Loading the archive…
      </div>
    </section>

    <!-- ===================== STATISTICS ===================== -->
    <section class="stats" id="stats" aria-label="By the numbers" hidden>
      <div class="stats__inner">
        <p class="section-eyebrow">By the numbers</p>
        <h2 class="stats__heading">The archive, counted</h2>
        <div class="stats__grid" id="stats-grid"></div>
        <div class="bars" id="bars-lang" aria-label="Films by language"></div>
        <div class="bars" id="bars-year" aria-label="Films by year"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__mark">Absolute Cinema</p>
    <p class="footer__note">Every ticket. Every screening. Every memory.</p>
    <a class="footer__top" href="#top">Back to the top</a>
  </footer>

  <!-- Data is loaded as a script so the site works even from disk (file://). -->
  <script src="data/movies.js"></script>
  <script src="script.js"></script>
</body>
</html>
