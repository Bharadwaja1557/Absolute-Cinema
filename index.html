<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute Cinema — A personal moviegoing archive</title>
  <meta name="description" content="A personal archive of every film watched in a theater. Every ticket, every screening, every memory." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230c0a08'/><circle cx='16' cy='16' r='8' fill='%23e0b15c'/></svg>" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Absolute Cinema — A personal moviegoing archive" />
  <meta property="og:description" content="A personal archive of every film watched in a theater. Every ticket, every screening, every memory." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body id="top">

  <!-- film-grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ===================== STICKY HEADER ===================== -->
  <header class="nav" id="nav">
    <a class="nav__brand" href="#top" aria-label="Absolute Cinema — home">
      <span class="nav__mark" aria-hidden="true"></span>
      <span class="nav__name">Absolute Cinema</span>
    </a>

    <div class="nav__tools">
      <label class="search" for="search-input">
        <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" />
        </svg>
        <input id="search-input" class="search__input" type="search"
          placeholder="Search the archive…" autocomplete="off" spellcheck="false"
          aria-label="Search films" />
      </label>

      <div class="select">
        <select id="filter-year" aria-label="Filter by year">
          <option value="all">All years</option>
        </select>
      </div>
      <div class="select">
        <select id="filter-lang" aria-label="Filter by language">
          <option value="all">All languages</option>
        </select>
      </div>
      <button id="sort-toggle" class="pill" type="button" aria-label="Toggle sort order">
        <span class="pill__icon" id="sort-icon" aria-hidden="true">↓</span>
        <span id="sort-label">Newest</span>
      </button>
    </div>
  </header>

  <!-- ===================== HERO ===================== -->
  <section class="hero" id="hero" aria-label="Featured">
    <div class="hero__backdrop" id="hero-backdrop" aria-hidden="true"></div>
    <div class="hero__veil" aria-hidden="true"></div>

    <div class="hero__inner">
      <div class="hero__lede">
        <p class="eyebrow">A personal moviegoing archive</p>
        <h1 class="hero__title">Absolute<br />Cinema</h1>
        <p class="hero__tag">Every ticket. Every screening. Every memory.</p>
        <div class="hero__stats" id="hero-stats" aria-live="polite"></div>
        <a class="hero__cue" href="#gallery-start">
          <span>Enter the archive</span>
          <span class="hero__cue-arrow" aria-hidden="true">↓</span>
        </a>
      </div>

      <figure class="hero__feature" id="hero-feature" hidden>
        <p class="hero__feature-label">Last seen in a theatre</p>
        <button class="hero__card" id="hero-card" type="button">
          <span class="hero__card-frame">
            <img id="hero-poster" alt="" loading="eager" />
          </span>
        </button>
        <figcaption class="hero__feature-cap">
          <span class="hero__feature-title" id="hero-film-title"></span>
          <span class="hero__feature-sub" id="hero-film-sub"></span>
        </figcaption>
      </figure>
    </div>
  </section>

  <main>
    <span id="gallery-start"></span>

    <!-- meta line: count + clear -->
    <div class="meta-bar">
      <p class="meta-bar__count" id="result-count" aria-live="polite">—</p>
      <button class="meta-bar__clear" id="clear-filters" type="button" hidden>
        Clear filters
      </button>
    </div>

    <!-- ===================== GALLERY ===================== -->
    <section class="gallery" id="gallery" aria-label="Films by year">
      <div class="loading" id="loading">
        <span class="loading__reel" aria-hidden="true"></span> Loading the archive…
      </div>
    </section>

    <!-- ===================== STATISTICS ===================== -->
    <section class="stats" id="stats" aria-label="By the numbers" hidden>
      <div class="stats__inner">
        <p class="eyebrow eyebrow--gold">By the numbers</p>
        <h2 class="stats__heading">The archive, counted</h2>
        <div class="stats__grid" id="stats-grid"></div>
        <div class="stats__bars">
          <div class="bars" id="bars-lang" aria-label="Films by language"></div>
          <div class="bars" id="bars-year" aria-label="Films by year"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span class="footer__mark-dot" aria-hidden="true"></span>
    <p class="footer__mark">Absolute Cinema</p>
    <p class="footer__note">Every ticket. Every screening. Every memory.</p>
    <a class="footer__top" href="#top">Back to the top ↑</a>
  </footer>

  <!-- ===================== FILM DETAIL MODAL ===================== -->
  <div class="modal" id="film-modal" hidden>
    <div class="modal__backdrop" id="modal-backdrop" aria-hidden="true"></div>
    <div class="modal__scrim" id="modal-scrim" aria-hidden="true"></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal__close" id="modal-close" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
      <div class="modal__poster">
        <img id="modal-poster-img" alt="" />
        <div class="modal__tags" id="modal-tags"></div>
      </div>
      <div class="modal__body">
        <p class="modal__eyebrow" id="modal-eyebrow"></p>
        <h2 class="modal__title" id="modal-title"></h2>
        <dl class="modal__facts" id="modal-facts"></dl>
      </div>
    </div>
  </div>

  <!-- Data is loaded as a script so the site works even from disk (file://). -->
  <script src="data/movies.js"></script>
  <script src="script.js"></script>
</body>
</html>
